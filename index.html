<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trailer Driver: Road Jobs</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <main class="shell">
    <section class="game-card">
      <div class="game-stage">
        <canvas id="game" width="1280" height="720" aria-label="Trailer Driver Spielansicht"></canvas>
        <form id="companyForm" class="start-panel" aria-label="Firmennamen wählen">
          <h1>Firma gründen</h1>
          <p>Wähle am Anfang deinen Firmennamen. Er wird als Aufschrift auf dem Anhänger angezeigt.</p>
          <label for="companyName">Firmenname</label>
          <input id="companyName" name="companyName" maxlength="22" value="Meine Transportfirma" autocomplete="organization" />
          <button type="submit">Spiel starten</button>
        </form>
      </div>
      <div class="hint">
        <strong>Trailer Driver: Road Jobs</strong> — Auto + Anhänger, Paletten-Aufträge, Ein-/Aussteigen mit <kbd>E</kbd>
      </div>
    </section>
  </main>
  <script src="src/game.js"></script>
</body>
</html>
